                </div>
            `;
            const board = document.getElementById('br-board');
            const paddle = document.getElementById('br-paddle');
            const ball = document.getElementById('br-ball');
            const bricksDiv = document.getElementById('br-bricks');

            const initBricks = () => {
                bricks = []; bricksDiv.innerHTML = '';
                const colors = ['bg-red-500','bg-orange-500','bg-yellow-400','bg-green-500','bg-blue-500'];
                for(let r=0; r<5; r++) {
                    for(let c=0; c<6; c++) {
                        let b = { x: c*44+10, y: r*18+10, w: 40, h: 14, active: true, el: document.createElement('div') };
                        b.el.className = `absolute rounded-sm ${colors[r]}`;
                        b.el.style.width=`${b.w}px`; b.el.style.height=`${b.h}px`;
                        b.el.style.left=`${b.x}px`; b.el.style.top=`${b.y}px`;
                        bricksDiv.appendChild(b.el);
                        bricks.push(b);
                    }
                }
            };

            const start = () => {
                play=true; score=0; px=110; bx=135; by=280; vx=3; vy=-3;
                document.getElementById('br-score').textContent=0;
                document.getElementById('br-ov').classList.add('hidden');
                initBricks();
                reqId = requestAnimationFrame(loop);
            };

            const loop = () => {
                if(!play) return;
                bx+=vx; by+=vy;

                // Wall collision
                if(bx<=0 || bx>=270) vx = -vx;
                if(by<=0) vy = -vy;

                // Paddle collision (y=326, h=10, w=60)
                if(by>=316 && by<=326 && bx>=px-10 && bx<=px+60) {
                    vy = -Math.abs(vy);
                    vx = (bx - (px+30)) * 0.15; // 바운스 각도 변경
                }

                // Brick collision
                let hitCount = 0;
                for(let b of bricks) {
                    if(b.active && bx>=b.x-10 && bx<=b.x+b.w && by>=b.y-10 && by<=b.y+b.h) {
                        b.active=false; b.el.classList.add('hidden');
                        vy = -vy; score+=10; document.getElementById('br-score').textContent=score;
                        break; // 한 프레임에 하나만
                    }
                    if(!b.active) hitCount++;
                }

                ball.style.left=`${bx}px`; ball.style.top=`${by}px`;
                paddle.style.left=`${px}px`;

                // Game Over
                if(by>=340) {
                    play=false;
                    document.getElementById('br-ov').classList.remove('hidden');
                    document.getElementById('br-msg').textContent = '앗! 떨어졌다!';
                    document.getElementById('br-msg').classList.remove('hidden');
                    document.getElementById('br-st').textContent = '다시하기';
                } else if(hitCount === 30) {
                    play=false;
                    document.getElementById('br-ov').classList.remove('hidden');
                    document.getElementById('br-msg').textContent = '🎉 퍼펙트 클리어! 🎉';
                    document.getElementById('br-msg').classList.remove('hidden');
                    document.getElementById('br-st').textContent = '다시하기';
                } else reqId = requestAnimationFrame(loop);
            };

            document.getElementById('br-st').addEventListener('click', start);

            const tmv = (e) => {
                if(!play) return;
                const rect = board.getBoundingClientRect();
                px = Math.max(0,Math.min(220, ((e.touches?e.touches[0].clientX:e.clientX)-rect.left) - 30));
            };
            board.addEventListener('touchmove', tmv, {passive:true});
            board.addEventListener('mousemove', (e)=>{if(e.buttons===1)tmv(e);});

            return () => cancelAnimationFrame(reqId);
        };

        // ==========================================
        // 21. 타이밍 맞추기 (Timing Game)
        // ==========================================
        const mountTiming = (container) => {
            let play=false, score=0, reqId;
            let lineX=0, dir=1, speed=1.5, targetX=40, targetW=20;

            container.innerHTML = `
                <div class="flex flex-col items-center w-full touch-none select-none">
                    <div class="flex justify-between w-full max-w-sm px-4 mb-4 text-xl font-bold">
                        <span class="text-indigo-600">점수: <span id="tm-score">0</span></span>
                    </div>
                    <div id="tm-board" class="relative bg-gray-200 w-full max-w-sm h-24 rounded-xl overflow-hidden shadow-inner mb-8 transition-colors duration-100">
                        <div id="tm-target" class="absolute h-full bg-green-400 opacity-60" style="left: 40%; width: 20%;"></div>
                        <div id="tm-line" class="absolute h-full w-2 bg-red-600 top-0 shadow-[0_0_8px_red] z-10" style="left: 0%;"></div>
                        <div id="tm-ov" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center z-20 text-white">
                            <p id="tm-msg" class="text-2xl font-bold mb-2 hidden"></p>
                            <button id="tm-st" class="bg-indigo-500 px-6 py-2 rounded-full font-bold mt-2">시작하기</button>
                        </div>
                    </div>
                    <button id="tm-action" class="w-48 h-48 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-bold text-4xl shadow-xl active:scale-95 active:shadow-inner transition-transform flex items-center justify-center cursor-pointer hover:brightness-110">HIT!</button>
                    <p class="mt-6 text-sm text-gray-500 text-center">빈 화면 좌클릭, HIT 버튼 터치, 또는 스페이스바!</p>
                </div>
            `;
            lucide.createIcons();

            const line = document.getElementById('tm-line');
            const target = document.getElementById('tm-target');
            const ov = document.getElementById('tm-ov');
            const msg = document.getElementById('tm-msg');
            const stBtn = document.getElementById('tm-st');
            const actionBtn = document.getElementById('tm-action');
            const board = document.getElementById('tm-board');

            const resetLevel = () => {
                speed = 1.2 + (score * 0.15); // 점수가 오를수록 선이 빨라짐
                targetW = Math.max(3, 20 - (score * 0.4)); // 점수가 오를수록 타겟이 좁아짐
                targetX = Math.random() * (100 - targetW); // 타겟 위치 랜덤 재배치
                target.style.left = `${targetX}%`;
                target.style.width = `${targetW}%`;
            };

            const start = () => {
                play = true; score = 0; lineX = 0; dir = 1;
                document.getElementById('tm-score').textContent = 0;
                ov.classList.add('hidden');
                resetLevel();
                reqId = requestAnimationFrame(loop);
            };

            const loop = () => {
                if(!play) return;
                lineX += dir * speed;
                // 양끝에 닿으면 방향 전환
                if(lineX >= 100 || lineX <= 0) {
                    dir *= -1;
                    lineX = Math.max(0, Math.min(100, lineX));
                }
                line.style.left = `${lineX}%`;
                reqId = requestAnimationFrame(loop);
            };

            const doHit = (e) => {
                if(e) e.preventDefault();
                if(!play) return;
                
                // 중심점 기준 판정 (선이 타겟 영역 안에 있는지 확인)
                if(lineX >= targetX && lineX <= targetX + targetW) {
                    score++;
                    document.getElementById('tm-score').textContent = score;
                    
                    // 성공 시 배경 반짝임 효과
                    board.classList.add('bg-green-200');
                    setTimeout(() => board.classList.remove('bg-green-200'), 100);
                    
                    resetLevel();
                } else {
                    // 실패 시 게임 오버
                    play = false;
                    ov.classList.remove('hidden');
                    msg.textContent = `실패! 최종 점수: ${score}`;
                    msg.classList.remove('hidden');
                    stBtn.textContent = '다시하기';
                }
            };

            stBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // 시작 버튼 누를 때 배경 클릭 판정 안 되게 방지
                start();
            });

            // 1. 하단 HIT 버튼 처리 (모바일 터치 & PC 클릭)
            actionBtn.addEventListener('mousedown', doHit);
            actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); doHit(); }, {passive:false});

            // 2. 배경 마우스 좌클릭 처리
            const bgClick = (e) => {
                // 시작 버튼이나 컨트롤 버튼이 아닌 빈 공간을 좌클릭(button === 0) 했을 때만 반응
                if(play && e.target.id !== 'tm-st' && e.target.id !== 'tm-action') {
                    if (e.button === 0) doHit(); 
                }
            };
            container.addEventListener('mousedown', bgClick);

            // 3. 키보드 스페이스바 처리
            const keydown = (e) => {
                if(!play) return;
                if(e.code === 'Space') {
                    e.preventDefault();
                    doHit();
                }
            };
            window.addEventListener('keydown', keydown);

            return () => { 
                cancelAnimationFrame(reqId); 
                window.removeEventListener('keydown', keydown); 
                container.removeEventListener('mousedown', bgClick);
            };
        };

        // ==========================================
        // 22. 픽시 자전거 (Fixie Bike Jump)
        // ==========================================
        const mountBikeJump = (container) => {
            let play=false, score=0, over=false;
            let py=0, vy=0, sliding=false, slideTimer=0;
            let obs=[];
            let reqId, lastT=0;

            container.innerHTML = `
                <div class="flex flex-col items-center w-full touch-none select-none">
                    <div class="flex justify-between w-full max-w-sm px-4 mb-4 text-xl font-bold">
                        <span class="text-sky-600">점수: <span id="bj-score">0</span></span>
                    </div>
                    <div id="bj-board" class="relative bg-sky-100 border-b-4 border-gray-800 w-full max-w-sm h-56 overflow-hidden shadow-inner rounded-t-xl cursor-pointer">
                        <div id="bj-ov" class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center z-30 text-white">
                            <p id="bj-msg" class="text-2xl font-bold mb-2 hidden">💥 쾅!</p>
                            <button id="bj-st" class="bg-sky-500 px-6 py-2 rounded-full font-bold mt-2 shadow-lg">출발하기</button>
                        </div>
                        <div id="bj-player" class="absolute bottom-0 w-12 h-12 flex items-end justify-center text-4xl transition-transform duration-75 z-20" style="left:10%; transform-origin: bottom center;">
                            <span id="bj-emoji">🚴</span>
                        </div>
                    </div>
                    <div class="flex justify-center space-x-4 mt-6 w-full max-w-sm px-4">
                        <button id="bj-btn-jump" class="flex-1 bg-gray-200 p-4 rounded-xl flex items-center justify-center font-bold active:bg-gray-300 shadow-sm"><i data-lucide="arrow-up" class="mr-2"></i> 점프</button>
                        <button id="bj-btn-slide" class="flex-1 bg-gray-200 p-4 rounded-xl flex items-center justify-center font-bold active:bg-gray-300 shadow-sm"><i data-lucide="arrow-down" class="mr-2"></i> 슬라이딩</button>
                    </div>
                    <p class="mt-4 text-sm text-gray-500 text-center">벽은 점프(위/스페이스), 새는 슬라이딩(아래)으로 피해!</p>
                </div>
            `;
            lucide.createIcons();
            
            const board = document.getElementById('bj-board');
            const pEl = document.getElementById('bj-player');

            const doJump = () => { if(play && py===0 && !sliding) vy = 8.5; };
            const doSlide = () => { if(play && py===0 && !sliding) { sliding = true; slideTimer = 35; } };

            const start = () => {
                score=0; py=0; vy=0; sliding=false; slideTimer=0; obs=[]; play=true; over=false; lastT=performance.now();
                document.getElementById('bj-score').textContent = 0;
                pEl.innerHTML = '<span id="bj-emoji">🚴</span>'; 
                pEl.style.transform = `translateY(0px) rotate(0deg)`;
                document.getElementById('bj-ov').classList.add('hidden');
                document.querySelectorAll('.bj-obs').forEach(e=>e.remove());
                reqId = requestAnimationFrame(loop);
            };

            const loop = (time) => {
                if(!play) return;
                
                py += vy;
                if(py > 0) vy -= 0.45; else { py = 0; vy = 0; }
                if(sliding) { slideTimer--; if(slideTimer<=0) sliding = false; }

                if(!over) {
                    if(sliding) {
                        pEl.style.transform = `translateY(0px) rotate(-60deg) scaleY(0.7)`; 
                    } else {
                        pEl.style.transform = `translateY(-${py*2.5}px) rotate(${py>0 ? -15 : 0}deg)`; 
                    }
                }

                score++;
                if(score % 10 === 0) document.getElementById('bj-score').textContent = Math.floor(score/10);
                
                const speed = 1.3 + (score*0.0003);
                if(time - lastT > Math.max(700, 1500 - score*0.1)) {
                    const isBird = Math.random() > 0.5; 
                    const ob = { id: Math.random(), type: isBird?'bird':'wall', x: 100, y: isBird?35:0, spd: speed, el: document.createElement('div') };
                    ob.el.className = 'bj-obs absolute text-3xl z-10';
                    ob.el.textContent = isBird ? '🦅' : '🧱';
                    ob.el.style.left = '100%';
                    ob.el.style.bottom = `${ob.y}px`;
                    board.appendChild(ob.el);
                    obs.push(ob);
                    lastT = time;
                }

                let hit = false;
                obs = obs.filter(o => {
                    o.x -= o.spd;
                    o.el.style.left = `${o.x}%`;
                    
                    const pLeft=10, pRight=20;
                    const pBottom = py*2.5;
                    const pTop = pBottom + (sliding ? 25 : 45); 
                    const oLeft=o.x, oRight=o.x+8;
                    const oBottom=o.y, oTop=o.y+30;

                    if(oLeft < pRight && oRight > pLeft && !(pBottom > oTop || pTop < oBottom)) hit = true;
                    if(o.x < -10) { o.el.remove(); return false; }
                    return true;
                });

                if(hit) {
                    play=false; over=true;
                    pEl.innerHTML = '<span class="absolute inline-block transform -translate-x-12 rotate-[120deg] opacity-60 text-3xl">🚲</span><span class="inline-block transform translate-x-6 rotate-[100deg] text-4xl">😵</span>';
                    pEl.style.transform = `translateY(0px)`;
                    
                    document.getElementById('bj-ov').classList.remove('hidden');
                    document.getElementById('bj-msg').textContent = '💥 미끄러졌다!';
                    document.getElementById('bj-msg').classList.remove('hidden');
                    document.getElementById('bj-st').textContent = '다시타기';
                } else reqId = requestAnimationFrame(loop);
            };

            document.getElementById('bj-st').addEventListener('click', (e) => { e.stopPropagation(); start(); });
            document.getElementById('bj-btn-jump').addEventListener('mousedown', (e)=>{e.preventDefault(); doJump();});
            document.getElementById('bj-btn-jump').addEventListener('touchstart', (e)=>{e.preventDefault(); doJump();}, {passive:false});
            document.getElementById('bj-btn-slide').addEventListener('mousedown', (e)=>{e.preventDefault(); doSlide();});
            document.getElementById('bj-btn-slide').addEventListener('touchstart', (e)=>{e.preventDefault(); doSlide();}, {passive:false});

            board.addEventListener('mousedown', (e)=>{ if(e.target.tagName!=='BUTTON') doJump(); });
            board.addEventListener('touchstart', (e)=>{ if(e.target.tagName!=='BUTTON') doJump(); }, {passive:true});

            const keydown = (e) => {
                if(!play) return;
                if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
                if(e.code==='Space' || e.code==='ArrowUp') doJump();
                if(e.code==='ArrowDown') doSlide();
            };
            window.addEventListener('keydown', keydown);

            return () => { cancelAnimationFrame(reqId); window.removeEventListener('keydown', keydown); };
        };

        // ==========================================
        // 메인 데이터 & 라우팅
        // ==========================================
        const GAMES = [
            { id: 'tetris', title: '테트리스', icon: 'blocks', color: 'bg-indigo-100 text-indigo-600', mount: mountTetris },
            { id: 'baseball', title: '숫자 야구', icon: 'trophy', color: 'bg-orange-100 text-orange-600', mount: mountBaseball },
            { id: 'rps', title: '가위바위보', icon: 'scissors', color: 'bg-red-100 text-red-600', mount: mountRps },
            { id: 'fruit', title: '과일 받기', icon: 'apple', color: 'bg-green-100 text-green-600', mount: mountFruit },
            { id: 'gather', title: '먹이 줍기', icon: 'target', color: 'bg-emerald-100 text-emerald-600', mount: mountGather },
            { id: 'tictactoe', title: '틱택토', icon: 'grid-3x3', color: 'bg-blue-100 text-blue-600', mount: mountTicTacToe },
            { id: 'memory', title: '카드 맞추기', icon: 'brain-circuit', color: 'bg-purple-100 text-purple-600', mount: mountMemory },
            { id: 'whack', title: '두더지 잡기', icon: 'gamepad-2', color: 'bg-amber-100 text-amber-700', mount: mountWhack },
            { id: 'reaction', title: '반응속도', icon: 'zap', color: 'bg-yellow-100 text-yellow-600', mount: mountReaction },
            { id: 'math', title: '산수 퀴즈', icon: 'calculator', color: 'bg-cyan-100 text-cyan-600', mount: mountMath },
            { id: 'clicker', title: '10초 광클', icon: 'mouse-pointer-click', color: 'bg-pink-100 text-pink-600', mount: mountClicker },
            { id: 'color', title: '색깔 찾기', icon: 'palette', color: 'bg-rose-100 text-rose-600', mount: mountColor },
            { id: 'simon', title: '패턴 기억', icon: 'list-ordered', color: 'bg-violet-100 text-violet-600', mount: mountSimon },
            { id: 'jump', title: '점프점프', icon: 'person-standing', color: 'bg-teal-100 text-teal-600', mount: mountJump },
            { id: 'bomb', title: '폭탄 피하기', icon: 'bomb', color: 'bg-slate-200 text-slate-700', mount: mountBomb },
            { id: 'typing', title: '단어 타자', icon: 'keyboard', color: 'bg-fuchsia-100 text-fuchsia-600', mount: mountTyping },
            { id: 'racing', title: '레이싱', icon: 'car-front', color: 'bg-yellow-100 text-yellow-600', mount: mountRacing },
            { id: 'snake', title: '스네이크(NPC)', icon: 'bug', color: 'bg-lime-100 text-lime-700', mount: mountSnake },
            { id: '2048', title: '2048', icon: 'layout-grid', color: 'bg-amber-100 text-amber-800', mount: mount2048 },
            { id: 'breakout', title: '벽돌 깨기', icon: 'layout-template', color: 'bg-rose-100 text-rose-700', mount: mountBreakout },
            { id: 'timing', title: '타이밍 맞추기', icon: 'crosshair', color: 'bg-indigo-100 text-indigo-700', mount: mountTiming },
            { id: 'bikejump', title: '픽시 자전거', icon: 'bike', color: 'bg-sky-100 text-sky-600', mount: mountBikeJump },
        ];

        function initMenu() {
            const grid = document.getElementById('games-grid');
            GAMES.forEach(game => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-6 rounded-2xl shadow-sm hover:shadow-md border border-gray-100 flex flex-col items-center justify-center transition-all hover:-translate-y-1 group";
                btn.onclick = () => openGame(game.id);
                btn.innerHTML = `
                    <div class="p-4 rounded-2xl mb-4 ${game.color} group-hover:scale-110 transition-transform">
                        <i data-lucide="${game.icon}" class="w-9 h-9"></i>
                    </div>
                    <h3 class="font-bold text-gray-700 text-lg">${game.title}</h3>
                `;
                grid.appendChild(btn);
            });
            lucide.createIcons();
        }

        window.openGame = (id) => {
            const game = GAMES.find(g => g.id === id);
            if(!game) return;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            document.getElementById('game-header-title').innerHTML = `
                <span class="p-2 rounded-lg mr-3 ${game.color}"><i data-lucide="${game.icon}" class="w-6 h-6"></i></span>
                ${game.title}
            `;
            lucide.createIcons();

            const container = document.getElementById('game-container');
            container.innerHTML = '';
            currentCleanup = game.mount(container);
        };

        window.closeGame = () => {
            if(currentCleanup) { currentCleanup(); currentCleanup = null; }
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        };

        // 앱 초기화
        initMenu();

    </script>
</body>
</html>
