<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 하시게임 점검중</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }

        .maintenance-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .gear-icon {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="maintenance-card bg-white rounded-2xl p-8 md:p-12 max-w-lg w-full text-center">
        <!-- Error Code -->
        <div class="text-6xl font-bold text-gray-200 mb-4">404</div>
        
        <!-- Animated Icon (Optional, for visual flair) -->
        <div class="flex justify-center mb-6">
            <svg class="gear-icon w-20 h-20 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </div>

        <!-- Main Message -->
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">
            하시게임 점검중입니다.
        </h1>
        
        <p class="text-gray-600 mb-8 leading-relaxed">
            더 안정적인 서비스를 제공하기 위해 현재 시스템을 점검하고 있습니다.<br>
            이용에 불편을 드려 죄송합니다.
        </p>

        <!-- Company Name -->
        <div class="pt-6 border-t border-gray-100">
            <span class="text-blue-600 font-bold text-lg">[하시소프트웨어]</span>
        </div>

        <!-- Home Button (Optional) -->
        <button onclick="window.location.reload()" class="mt-8 px-6 py-2 bg-gray-800 text-white rounded-full hover:bg-gray-700 transition duration-300">
            새로고침
        </button>
    </div>

</body>
</html>
