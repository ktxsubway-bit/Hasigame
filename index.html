<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하시게임</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Three.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* 커스텀 스타일 */
        body { -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .touch-none { touch-action: none; }
        .preserve-3d { transform-style: preserve-3d; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        
        /* 컬러 게임 그리드 */
        .color-grid { display: grid; gap: 4px; width: 100%; height: 100%; }
        
        /* 숨김 처리 유틸 */
        .hidden { display: none !important; }
        
        /* 공지사항 스크롤 애니메이션 */
        .notice-container { overflow: hidden; white-space: nowrap; }
        .notice-content { display: inline-block; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- 메인 메뉴 화면 -->
    <div id="menu-screen" class="min-h-screen">
        <!-- 상단 바 -->
        <header class="bg-white border-b px-4 py-3 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">하시게임</h1>
            <button class="p-2 text-gray-500"><i data-lucide="info" class="w-6 h-6"></i></button>
        </header>

        <!-- 공지사항 바 -->
        <div class="bg-indigo-50 px-4 py-2 border-b overflow-hidden notice-container">
            <div class="notice-content text-sm text-indigo-700 font-medium">
                📢 새로운 3D 점프 게임이 업데이트 되었습니다! | 즐거운 게임 시간 되세요! | 버그 제보는 언제나 환영입니다.
            </div>
        </div>

        <!-- 게임 리스트 -->
        <main class="p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="game-list">
            <!-- 게임 카드는 JS로 동적 생성됨 -->
        </main>
    </div>

    <!-- 게임 실행 화면 (모달 레이어) -->
    <div id="game-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col">
        <header class="bg-white border-b px-4 py-3 flex justify-between items-center">
            <div id="game-header-title" class="flex items-center font-bold text-lg text-gray-800">
                <!-- 게임 아이콘/제목 삽입 위치 -->
            </div>
            <button onclick="closeGame()" class="p-2 bg-gray-100 rounded-full text-gray-600 hover:bg-gray-200 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </header>
        <div id="game-container" class="flex-1 relative overflow-hidden bg-gray-100">
            <!-- 실제 게임 콘텐츠가 주입되는 위치 -->
        </div>
    </div>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 게임 데이터 정의
        const games = [
            { 
                id: 'jump3d', 
                title: '3D 점프점프', 
                icon: 'zap', 
                color: 'bg-yellow-400', 
                mount: (container) => {
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0xa0a0a0);
                    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                    const renderer = new THREE.WebGLRenderer({ antialias: true });
                    renderer.setSize(container.clientWidth, container.clientHeight);
                    container.appendChild(renderer.domElement);

                    const light = new THREE.DirectionalLight(0xffffff, 1);
                    light.position.set(5, 10, 5);
                    scene.add(new THREE.AmbientLight(0x404040));
                    scene.add(light);

                    const floorGeo = new THREE.PlaneGeometry(100, 100);
                    const floorMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
                    const floor = new THREE.Mesh(floorGeo, floorMat);
                    floor.rotation.x = -Math.PI / 2;
                    scene.add(floor);

                    const playerGeo = new THREE.BoxGeometry(1, 1, 1);
                    const playerMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 });
                    const player = new THREE.Mesh(playerGeo, playerMat);
                    player.position.y = 0.5;
                    scene.add(player);

                    camera.position.set(0, 5, 10);
                    camera.lookAt(player.position);

                    let velocity = 0;
                    let isJumping = false;

                    const jump = () => {
                        if(!isJumping) {
                            velocity = 0.2;
                            isJumping = true;
                        }
                    };

                    container.addEventListener('touchstart', jump);
                    container.addEventListener('mousedown', jump);

                    let animationId;
                    function animate() {
                        animationId = requestAnimationFrame(animate);
                        if(isJumping) {
                            player.position.y += velocity;
                            velocity -= 0.01;
                            if(player.position.y <= 0.5) {
                                player.position.y = 0.5;
                                isJumping = false;
                                velocity = 0;
                            }
                        }
                        renderer.render(scene, camera);
                    }
                    animate();

                    const handleResize = () => {
                        camera.aspect = container.clientWidth / container.clientHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(container.clientWidth, container.clientHeight);
                    };
                    window.addEventListener('resize', handleResize);

                    return () => {
                        cancelAnimationFrame(animationId);
                        window.removeEventListener('resize', handleResize);
                        container.removeEventListener('touchstart', jump);
                        container.removeEventListener('mousedown', jump);
                        renderer.dispose();
                    };
                }
            },
            { 
                id: 'color', 
                title: '컬러 퍼즐', 
                icon: 'palette', 
                color: 'bg-pink-400', 
                mount: (container) => {
                    const grid = document.createElement('div');
                    grid.className = 'color-grid h-full w-full p-4 grid grid-cols-4 gap-2';
                    const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#818cf8', '#a78bfa', '#f472b6', '#94a3b8'];
                    const cards = [...colors, ...colors].sort(() => Math.random() - 0.5);
                    
                    let flipped = [];
                    cards.forEach((color, i) => {
                        const card = document.createElement('div');
                        card.className = 'bg-gray-300 rounded-lg cursor-pointer transition-all duration-300 flex items-center justify-center';
                        card.dataset.color = color;
                        card.onclick = () => {
                            if(flipped.length < 2 && !card.style.backgroundColor) {
                                card.style.backgroundColor = color;
                                flipped.push(card);
                                if(flipped.length === 2) {
                                    if(flipped[0].dataset.color !== flipped[1].dataset.color) {
                                        setTimeout(() => {
                                            flipped[0].style.backgroundColor = '';
                                            flipped[1].style.backgroundColor = '';
                                            flipped = [];
                                        }, 500);
                                    } else {
                                        flipped = [];
                                    }
                                }
                            }
                        };
                        grid.appendChild(card);
                    });
                    container.appendChild(grid);
                    return () => {};
                }
            },
            {
                id: 'fps',
                title: '에임 연습',
                icon: 'crosshair',
                color: 'bg-red-500',
                mount: (container) => {
                    const canvas = document.createElement('div');
                    canvas.className = 'relative w-full h-full bg-slate-900 overflow-hidden';
                    let score = 0;
                    const scoreDisplay = document.createElement('div');
                    scoreDisplay.className = 'absolute top-4 left-4 text-white font-bold text-2xl z-10';
                    scoreDisplay.innerText = `점수: ${score}`;
                    canvas.appendChild(scoreDisplay);

                    const spawnTarget = () => {
                        const target = document.createElement('div');
                        const size = 50;
                        target.className = 'absolute rounded-full bg-red-400 border-4 border-white cursor-crosshair transition-transform active:scale-90 shadow-lg';
                        target.style.width = size + 'px';
                        target.style.height = size + 'px';
                        target.style.left = Math.random() * (container.clientWidth - size) + 'px';
                        target.style.top = Math.random() * (container.clientHeight - size) + 'px';
                        
                        target.onclick = (e) => {
                            e.stopPropagation();
                            score += 10;
                            scoreDisplay.innerText = `점수: ${score}`;
                            target.remove();
                            spawnTarget();
                        };
                        canvas.appendChild(target);
                    };

                    spawnTarget();
                    container.appendChild(canvas);
                    return () => {};
                }
            }
        ];

        // 리스트 렌더링
        const listContainer = document.getElementById('game-list');
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform hover:shadow-md";
            card.onclick = () => launchGame(game.id);
            card.innerHTML = `
                <div class="w-16 h-16 ${game.color} text-white rounded-2xl flex items-center justify-center mb-3 shadow-lg">
                    <i data-lucide="${game.icon}" class="w-8 h-8"></i>
                </div>
                <span class="font-bold text-gray-800">${game.title}</span>
            `;
            listContainer.appendChild(card);
        });
        lucide.createIcons();

        // 게임 제어 로직
        window.currentCleanup = null;

        window.launchGame = (id) => {
            const game = games.find(g => g.id === id);
            if(!game) return;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            document.getElementById('game-header-title').innerHTML = `
                <span class="p-2 rounded-lg mr-3 ${game.color} text-white shadow-sm"><i data-lucide="${game.icon}" class="w-5 h-5"></i></span>
                ${game.title}
            `;
            lucide.createIcons();

            const container = document.getElementById('game-container');
            container.innerHTML = '';
            
            if(id === 'jump3d' || id === 'fps') {
                container.className = "flex-1 relative overflow-hidden bg-black";
            } else {
                container.className = "flex-1 relative overflow-hidden bg-gray-100 p-4";
            }

            window.currentCleanup = game.mount(container);
        };

        window.closeGame = () => {
            if(window.currentCleanup) { 
                window.currentCleanup(); 
                window.currentCleanup = null; 
            }
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-container').innerHTML = '';
        };
    </script>
</body>
</html>
